<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soccer AI Pro - Advanced Analytics</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs" type="module"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; margin: 0; padding: 20px; }
        .wrapper { max-width: 900px; margin: 0 auto; }
        .video-stack { position: relative; width: 100%; background: #000; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        video { width: 100%; display: block; }
        /* Two canvases now: One for live boxes, one for the heatmap that builds over time */
        #heatmapLayer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; opacity: 0.7; z-index: 5; }
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        .controls { margin-top: 20px; background: #1e1e1e; padding: 20px; border-radius: 12px; display: flex; gap: 15px; align-items: center; }
        button { padding: 10px 15px; background: #00ff88; color: black; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #00cc6a; }
        #status { color: #ffcc00; font-weight: bold; margin-bottom: 10px; }
        #analytics { background: #2a2a2a; padding: 15px; border-left: 5px solid #00ff88; margin-top: 10px; font-family: monospace; }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Soccer AI: Tactical View</h2>
        <div id="status">Status: Initializing System...</div>
        
        <div class="video-stack">
            <video id="soccerVideo" controls crossorigin="anonymous"></video>
            <canvas id="heatmapLayer"></canvas>
            <canvas id="overlay"></canvas>
        </div>

        <div class="controls">
            <input type="file" id="videoUpload" accept="video/*">
            <button id="toggleHeatmap">Toggle Heat Map</button>
            <button id="clearData">Clear Data</button>
        </div>
        
        <div id="analytics">
            Players Tracked: 0 | Ball Detected: No
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
